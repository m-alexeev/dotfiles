format = '[$user]($style)'

[hostname]
ssh_only = false
style = 'fg:blue'
format = '[@$hostname]($style) '

[directory]
style = "fg:red"
read_only_style = "fg:orange"
truncation_length = 3
truncation_symbol = "â€¦/"
format = "[î—¾ $path]($style)[$read_only]($read_only_style) "

[git_branch]
style = "fg:green"
symbol = "îœ¥ "
format = "[$symbol$branch(:$remote_branch)]($style) "

[character]
success_symbol = '[ï„…](bold green)'
error_symbol = '[ï„…](bold red)'

[python]
symbol = "ًںگچ "
pyenv_version_name = true
