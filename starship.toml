format = """
$kubernetes\
$os\
$username\
$hostname\
$directory\
$git_branch\
$git_state\
$git_status\
$python\
$character"""

add_newline = false
palette = "black_metal_bathory"

[os]
disabled = false
format = '[$symbol ]($style)'
style = 'fg:grey2'

